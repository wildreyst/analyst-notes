<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // 1. Инициализируем без автоматического старта
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    // 2. Находим все блоки кода с классом language-mermaid
    const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
    
    mermaidBlocks.forEach(function (codeBlock) {
      // Берем родительский тег <pre>
      const preBlock = codeBlock.parentElement;
      
      // Создаем новый чистый тег <div> для Mermaid
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = codeBlock.textContent;

      // Заменяем громоздкий <pre><code...> на наш новый <div>
      preBlock.parentNode.insertBefore(div, preBlock);
      preBlock.parentNode.removeChild(preBlock);
    });

    // 3. Запускаем рендеринг для всех созданных div.mermaid
    mermaid.run();
  });
</script>
