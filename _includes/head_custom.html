<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    // Ищем блоки, которые генерирует Jekyll (он вешает класс на внешний div)
    const jekyllBlocks = document.querySelectorAll('.language-mermaid');
    
    jekyllBlocks.forEach(function (block) {
      // Ищем сам текст кода внутри блока
      const codeElement = block.querySelector('code');
      if (!codeElement) return;
      
      // Создаем правильный контейнер, который требует Mermaid
      const mermaidDiv = document.createElement('div');
      mermaidDiv.className = 'mermaid';
      mermaidDiv.textContent = codeElement.textContent;

      // Вставляем новый блок перед старым, а старый (от Jekyll) удаляем
      block.parentNode.insertBefore(mermaidDiv, block);
      block.parentNode.removeChild(block);
    });

    // Запускаем отрисовку всех найденных диаграмм
    mermaid.run();
  });
</script>
